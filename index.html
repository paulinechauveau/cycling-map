<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mes Sorties Gravel</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-gpx/2.1.2/gpx.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #F0EDE7;
      --bg2:         #FFFFFF;
      --bg3:         #E8E4DC;
      --border:      rgba(0,0,0,0.07);
      --border2:     rgba(0,0,0,0.13);
      --text:        #1A1917;
      --text2:       #6B6760;
      --text3:       #ABA79F;
      --accent:      #FC4C02;
      --gravel:      #D97706;
      --route:       #2563EB;
      --fait:        #16A34A;
      --a-tester:    #D97706;
      --hiver:       #0284C7;
      --ete:         #EA580C;
      --intersaison: #7C3AED;
    }

    html, body { height: 100%; font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }

    .app { display: grid; grid-template-rows: 56px 1fr; grid-template-columns: 280px 1fr; height: 100vh; }

    /* ─── HEADER ─── */
    header {
      grid-column: 1 / -1;
      display: flex; align-items: stretch;
      background: var(--bg2);
      border-bottom: 1px solid var(--border2);
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .header-accent { width: 5px; background: var(--accent); flex-shrink: 0; }
    .stats-bar { display: flex; align-items: center; padding: 0 4px; flex: 1; }
    .stat-block {
      display: flex; flex-direction: column; justify-content: center;
      padding: 0 20px; line-height: 1;
    }
    .stat-block strong {
      font-size: 21px; font-weight: 800; font-family: 'Space Mono', monospace;
      color: var(--text); display: block;
    }
    .stat-block span {
      font-size: 9px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.1em; color: var(--text3); margin-top: 3px; display: block;
    }
    .stat-block.t-gravel strong { color: var(--gravel); }
    .stat-block.t-route  strong { color: var(--route); }
    .stat-divider { width: 1px; height: 28px; background: var(--border2); flex-shrink: 0; }
    .loading-pill {
      margin: auto 16px auto auto; font-size: 11px; color: var(--text3);
      background: var(--bg); border: 1px solid var(--border2);
      padding: 4px 10px; border-radius: 20px; white-space: nowrap;
    }
    .loading-spinner { display: inline-block; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── SIDEBAR ─── */
    aside {
      background: var(--bg2);
      border-right: 1px solid var(--border2);
      display: flex; flex-direction: column;
      overflow: hidden;
    }

    .filters {
      padding: 14px 16px 10px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      overflow-y: auto;
      max-height: 52vh;
    }
    .filters::-webkit-scrollbar { width: 3px; }
    .filters::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

    .filter-title { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text3); margin-bottom: 12px; }
    .filter-group { margin-bottom: 11px; }
    .filter-label { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text3); margin-bottom: 6px; display: block; }

    .toggle-row { display: flex; gap: 5px; flex-wrap: wrap; }
    .toggle {
      font-size: 11px; font-weight: 500;
      padding: 4px 10px; border-radius: 20px;
      border: 1px solid var(--border2);
      background: transparent; color: var(--text3);
      cursor: pointer; transition: all 0.15s; white-space: nowrap;
    }
    .toggle:hover { border-color: var(--text2); color: var(--text2); background: var(--bg); }
    .toggle.active                { color: var(--text2); background: var(--bg3); }
    .toggle.active.t-gravel      { border-color: var(--gravel); color: var(--gravel); background: rgba(217,119,6,0.08); }
    .toggle.active.t-route       { border-color: var(--route);  color: var(--route);  background: rgba(37,99,235,0.08); }
    .toggle.active.t-fait        { border-color: var(--fait);   color: var(--fait);   background: rgba(22,163,74,0.08); }
    .toggle.active.t-a_tester    { border-color: var(--a-tester); color: var(--a-tester); background: rgba(217,119,6,0.08); }
    .toggle.active.t-hiver       { border-color: var(--hiver);  color: var(--hiver);  background: rgba(2,132,199,0.08); }
    .toggle.active.t-ete         { border-color: var(--ete);    color: var(--ete);    background: rgba(234,88,12,0.08); }
    .toggle.active.t-intersaison { border-color: var(--intersaison); color: var(--intersaison); background: rgba(124,58,237,0.08); }
    .toggle.active.t-year,
    .toggle.active.t-dist,
    .toggle.active.t-elev        { border-color: var(--accent); color: var(--accent); background: rgba(252,76,2,0.08); }

    .toggle .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 5px; vertical-align: middle; }

    /* ─── RIDE LIST ─── */
    .ride-list { flex: 1; overflow-y: auto; padding: 8px; background: var(--bg); }
    .ride-list::-webkit-scrollbar { width: 4px; }
    .ride-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

    .ride-card {
      padding: 10px 12px; border-radius: 8px; margin-bottom: 4px;
      border: 1px solid var(--border);
      background: var(--bg2);
      cursor: pointer; transition: all 0.12s;
      position: relative; overflow: hidden;
    }
    .ride-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; }
    .ride-card.type-gravel::before { background: var(--gravel); }
    .ride-card.type-route::before  { background: var(--route); }
    .ride-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.1); border-color: var(--border2); transform: translateY(-1px); }
    .ride-card.selected { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(252,76,2,0.12); }
    .ride-card.is-private { opacity: 0.45; }

    .ride-card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 6px; }
    .ride-name { font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.3; }
    .ride-badges { display: flex; gap: 4px; flex-shrink: 0; }
    .badge { font-size: 9px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; padding: 2px 7px; border-radius: 10px; }
    .badge-fait      { background: rgba(22,163,74,0.1);  color: #16A34A; }
    .badge-a_tester  { background: rgba(217,119,6,0.1);  color: #D97706; }
    .badge-gravel    { background: rgba(217,119,6,0.1);  color: var(--gravel); }
    .badge-route     { background: rgba(37,99,235,0.1);  color: var(--route); }
    .badge-private   { background: rgba(0,0,0,0.05);     color: var(--text3); }

    .ride-meta { display: flex; gap: 12px; margin-top: 5px; }
    .ride-meta span { font-size: 11px; color: var(--text2); font-weight: 500; }
    .ride-date { font-size: 10px; color: var(--text3); margin-top: 3px; font-family: 'Space Mono', monospace; }
    .no-results { padding: 24px 16px; text-align: center; font-size: 13px; color: var(--text3); }

    /* ─── SIDEBAR FOOTER ─── */
    .sidebar-footer { padding: 10px 16px; border-top: 1px solid var(--border); flex-shrink: 0; background: var(--bg2); }
    .export-btn {
      width: 100%; padding: 8px; font-size: 11px; font-weight: 700; letter-spacing: 0.04em;
      text-transform: uppercase;
      border-radius: 6px; border: 1.5px solid var(--accent);
      background: transparent; color: var(--accent); cursor: pointer; transition: all 0.15s;
    }
    .export-btn:hover { background: var(--accent); color: white; }

    /* ─── MAP ─── */
    #map { width: 100%; height: 100%; background: #E4DFDA; }

    /* ─── POPUP ─── */
    .leaflet-popup-content-wrapper {
      background: var(--bg2) !important; border: 1px solid var(--border2) !important;
      border-radius: 12px !important; box-shadow: 0 12px 40px rgba(0,0,0,0.15) !important;
      color: var(--text) !important;
    }
    .leaflet-popup-tip { background: var(--bg2) !important; }
    .leaflet-popup-content { margin: 14px 16px !important; min-width: 220px; }

    .popup-name  { font-weight: 700; font-size: 15px; margin-bottom: 8px; color: var(--text); line-height: 1.3; }
    .popup-badges { display: flex; gap: 5px; margin-bottom: 10px; flex-wrap: wrap; }
    .popup-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .popup-stat  { background: var(--bg); border-radius: 8px; padding: 8px 10px; }
    .popup-stat .pval { font-size: 18px; font-weight: 700; font-family: 'Space Mono', monospace; color: var(--text); }
    .popup-stat .plbl { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.07em; font-weight: 600; margin-top: 1px; }
    .popup-desc  { font-size: 12px; color: var(--text2); margin-top: 8px; line-height: 1.5; border-top: 1px solid var(--border); padding-top: 8px; }

    .popup-elev       { margin-top: 10px; border-top: 1px solid var(--border); padding-top: 10px; }
    .popup-elev-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px; font-weight: 700; }
    .elev-svg         { display: block; width: 100%; height: auto; border-radius: 4px; overflow: hidden; }
    .elev-range       { display: flex; justify-content: space-between; font-size: 10px; color: var(--text3); font-family: 'Space Mono', monospace; margin-top: 3px; }

    .popup-actions { display: flex; gap: 6px; margin-top: 10px; }
    .popup-btn {
      flex: 1; padding: 8px 6px; font-size: 11px; font-weight: 600;
      border-radius: 8px; border: 1px solid var(--border2);
      background: var(--bg); color: var(--text2);
      cursor: pointer; transition: all 0.15s; text-align: center;
    }
    .popup-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(252,76,2,0.06); }
    .popup-btn.is-private { border-color: var(--a-tester); color: var(--a-tester); background: rgba(217,119,6,0.06); }

    /* ─── MAP CONTROLS ─── */
    .leaflet-control-zoom { border: 1px solid var(--border2) !important; border-radius: 8px !important; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1) !important; }
    .leaflet-control-zoom a { background: var(--bg2) !important; color: var(--text) !important; border-color: var(--border) !important; font-weight: 700 !important; }
    .leaflet-control-zoom a:hover { background: var(--bg3) !important; }

    /* ─── TIMELINE ─── */
    .timeline {
      position: fixed; bottom: 16px; left: 296px; right: 16px;
      background: var(--bg2); border: 1px solid var(--border2);
      border-radius: 12px; padding: 10px 16px 8px; z-index: 1000;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    .timeline-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .timeline-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.12em; font-weight: 700; }
    .timeline-range { font-size: 11px; color: var(--text2); font-family: 'Space Mono', monospace; font-weight: 600; }
    .timeline-track { position: relative; height: 32px; }
    .timeline-axis  { position: absolute; bottom: 0; left: 0; right: 0; height: 1px; background: var(--border2); }
    .timeline-dots  { position: absolute; bottom: 6px; left: 0; right: 0; height: 20px; }
    .t-dot {
      position: absolute; width: 9px; height: 9px; border-radius: 50%;
      transform: translateX(-50%); cursor: pointer; transition: transform 0.15s;
      border: 2px solid rgba(255,255,255,0.9);
      box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    }
    .t-dot:hover { transform: translateX(-50%) scale(1.5); }
    .timeline-year-labels { display: flex; justify-content: space-between; margin-top: 4px; }
    .timeline-year-labels span { font-size: 10px; color: var(--text3); font-family: 'Space Mono', monospace; }
  </style>
</head>
<body>

<div class="app">
  <header>
    <div class="header-accent"></div>
    <div class="stats-bar">
      <div class="stat-block">
        <strong id="s-total">0</strong><span>sorties</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-block">
        <strong id="s-km">0</strong><span>km</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-block">
        <strong id="s-dplus">0</strong><span>m D+</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-block t-gravel">
        <strong id="s-gravel">0</strong><span>gravel</span>
      </div>
      <div class="stat-block t-route">
        <strong id="s-route">0</strong><span>route</span>
      </div>
    </div>
    <div class="loading-pill" id="loading-stat" style="display:none">
      <span class="loading-spinner">⟳</span> <strong id="s-loading">0</strong> GPX
    </div>
  </header>

  <aside>
    <div class="filters">
      <div class="filter-title">Filtres</div>

      <div class="filter-group">
        <span class="filter-label">Type</span>
        <div class="toggle-row">
          <button class="toggle active t-gravel" data-filter="type" data-value="gravel">
            <span class="dot" style="background:var(--gravel)"></span>Gravel
          </button>
          <button class="toggle active t-route" data-filter="type" data-value="route">
            <span class="dot" style="background:var(--route)"></span>Route
          </button>
        </div>
      </div>

      <div class="filter-group">
        <span class="filter-label">Statut</span>
        <div class="toggle-row">
          <button class="toggle active t-fait" data-filter="statut" data-value="fait">
            <span class="dot" style="background:var(--fait)"></span>Déjà fait
          </button>
          <button class="toggle active t-a_tester" data-filter="statut" data-value="a_tester">
            <span class="dot" style="background:var(--a-tester)"></span>À tester
          </button>
        </div>
      </div>

      <div class="filter-group">
        <span class="filter-label">Saison</span>
        <div class="toggle-row">
          <button class="toggle active t-ete" data-filter="saison" data-value="ete">
            <span class="dot" style="background:var(--ete)"></span>Été
          </button>
          <button class="toggle active t-hiver" data-filter="saison" data-value="hiver">
            <span class="dot" style="background:var(--hiver)"></span>Hiver
          </button>
          <button class="toggle active t-intersaison" data-filter="saison" data-value="intersaison">
            <span class="dot" style="background:var(--intersaison)"></span>Intersaison
          </button>
        </div>
      </div>

      <div class="filter-group">
        <span class="filter-label">Année</span>
        <div class="toggle-row" id="year-toggles"><!-- généré dynamiquement --></div>
      </div>

      <div class="filter-group">
        <span class="filter-label">Distance</span>
        <div class="toggle-row">
          <button class="toggle active t-dist" data-filter="distance" data-value="<50">&lt; 50 km</button>
          <button class="toggle active t-dist" data-filter="distance" data-value="50-100">50–100</button>
          <button class="toggle active t-dist" data-filter="distance" data-value=">100">&gt; 100 km</button>
        </div>
      </div>

      <div class="filter-group" style="margin-bottom:0">
        <span class="filter-label">Dénivelé</span>
        <div class="toggle-row">
          <button class="toggle active t-elev" data-filter="elevation" data-value="<500">&lt; 500 m</button>
          <button class="toggle active t-elev" data-filter="elevation" data-value="500-1000">500–1k</button>
          <button class="toggle active t-elev" data-filter="elevation" data-value=">1000">&gt; 1000 m</button>
        </div>
      </div>
    </div>

    <div class="ride-list" id="ride-list"></div>

    <div class="sidebar-footer">
      <button class="export-btn" onclick="exportRidesJson()">↓ Exporter rides.json</button>
    </div>
  </aside>

  <div id="map"></div>
</div>

<div class="timeline">
  <div class="timeline-header">
    <span class="timeline-label">Timeline</span>
    <span class="timeline-range" id="timeline-range">—</span>
  </div>
  <div class="timeline-track">
    <div class="timeline-dots" id="timeline-dots"></div>
    <div class="timeline-axis"></div>
  </div>
  <div class="timeline-year-labels" id="timeline-years"></div>
</div>

<script>
// ─── ÉTAT GLOBAL ──────────────────────────────────────────────────────────────
let allRides      = [];
let layers        = {};         // id → L.GPX layer
let rideColors    = {};         // id → couleur palette
let layerElevData = {};         // id → [[dist, alt], ...]
let statutOverrides = {};       // localStorage: statut modifié
let publicOverrides = {};       // localStorage: visibilité publique
let deletedRides    = new Set();// localStorage: rides supprimés
let PRIVACY_ZONES = [];         // zones de confidentialité GPS

let activeFilters = {
  type:      new Set(['gravel', 'route']),
  statut:    new Set(['fait', 'a_tester']),
  saison:    new Set(['ete', 'hiver', 'intersaison']),
  year:      new Set(),           // peuplé après chargement
  distance:  new Set(['<50', '50-100', '>100']),
  elevation: new Set(['<500', '500-1000', '>1000']),
};

const DISTANCE_BUCKETS = {
  '<50':     r => r.distance_km < 50,
  '50-100':  r => r.distance_km >= 50 && r.distance_km <= 100,
  '>100':    r => r.distance_km > 100,
};
const ELEVATION_BUCKETS = {
  '<500':     r => r.elevation_m < 500,
  '500-1000': r => r.elevation_m >= 500 && r.elevation_m <= 1000,
  '>1000':    r => r.elevation_m > 1000,
};

let selectedId = null;

// ─── CARTE LEAFLET ────────────────────────────────────────────────────────────
const map = L.map('map', { center: [48.65, 2.3], zoom: 9, attributionControl: false });
delete L.Icon.Default.prototype._getIconUrl;
L.Icon.Default.mergeOptions({
  iconRetinaUrl: 'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7',
  iconUrl:       'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7',
  shadowUrl: ''
});
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', { maxZoom: 18 }).addTo(map);
L.control.attribution({ prefix: false, position: 'bottomright' }).addTo(map);

const PALETTE = [
  '#FC4C02','#2563EB','#16A34A','#7C3AED','#0284C7',
  '#EA580C','#D97706','#059669','#DC2626','#4F46E5',
  '#0EA5E9','#65A30D','#C026D3','#B45309','#0F766E'
];
function getTrackColor(ride, index) { return PALETTE[index % PALETTE.length]; }

// ─── ZONES DE CONFIDENTIALITÉ GPS ────────────────────────────────────────────
async function loadPrivacyZones() {
  try {
    const res = await fetch('data/privacy_zones.json');
    if (res.ok) PRIVACY_ZONES = await res.json();
  } catch(e) { /* pas de fichier de zones — normal en déploiement */ }
}

function haversineKm(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dlat = (lat2-lat1)*Math.PI/180, dlon = (lon2-lon1)*Math.PI/180;
  const a = Math.sin(dlat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dlon/2)**2;
  return R * 2 * Math.asin(Math.sqrt(a));
}

function isInPrivacyZone(lat, lon) {
  return PRIVACY_ZONES.some(z => haversineKm(lat, lon, z.lat, z.lon) <= z.radius_km);
}

function applyPrivacyZones(layer) {
  if (!PRIVACY_ZONES.length) return;
  layer.getLayers().forEach(sub => {
    if (!(sub instanceof L.Polyline)) return;
    let pts = sub.getLatLngs();
    if (pts.length && Array.isArray(pts[0])) pts = pts.flat(Infinity);
    const segments = [];
    let seg = [];
    pts.forEach(pt => {
      if (isInPrivacyZone(pt.lat, pt.lng)) {
        if (seg.length > 1) segments.push([...seg]);
        seg = [];
      } else {
        seg.push(pt);
      }
    });
    if (seg.length > 1) segments.push(seg);
    sub.setLatLngs(segments.length ? segments : []);
  });
}

// ─── STATUT (localStorage) ────────────────────────────────────────────────────
function loadStatutOverrides() {
  try { statutOverrides = JSON.parse(localStorage.getItem('gravel-statut-overrides') || '{}'); }
  catch(e) { statutOverrides = {}; }
  allRides.forEach(r => { if (statutOverrides[r.id]) r.statut = statutOverrides[r.id]; });
}

function toggleStatut(id) {
  const ride = allRides.find(r => r.id === id);
  if (!ride) return;
  ride.statut = ride.statut === 'fait' ? 'a_tester' : 'fait';
  statutOverrides[ride.id] = ride.statut;
  localStorage.setItem('gravel-statut-overrides', JSON.stringify(statutOverrides));
  const layer = layers[id];
  if (layer) layer.bindPopup(popupHTML(ride, layerElevData[id]), { maxWidth: 300 });
  selectedId = id;
  applyFilters();
  if (layer && map.hasLayer(layer)) setTimeout(() => layer.openPopup(), 50);
}

// ─── VISIBILITÉ PUBLIQUE (localStorage) ───────────────────────────────────────
function loadPublicOverrides() {
  try { publicOverrides = JSON.parse(localStorage.getItem('gravel-public-overrides') || '{}'); }
  catch(e) { publicOverrides = {}; }
  allRides.forEach(r => {
    if (publicOverrides[r.id] !== undefined) {
      r.public = publicOverrides[r.id];
    } else if (r.public === undefined || r.public === null) {
      // Défaut : "à tester" = public, "fait" = privé
      r.public = (r.statut === 'a_tester');
    }
  });
}

function togglePublic(id) {
  const ride = allRides.find(r => r.id === id);
  if (!ride) return;
  ride.public = !ride.public;
  publicOverrides[ride.id] = ride.public;
  localStorage.setItem('gravel-public-overrides', JSON.stringify(publicOverrides));
  const layer = layers[id];
  if (layer) layer.bindPopup(popupHTML(ride, layerElevData[id]), { maxWidth: 300 });
  selectedId = id;
  renderList();
  if (layer && map.hasLayer(layer)) setTimeout(() => layer.openPopup(), 50);
}

// ─── SUPPRESSION ─────────────────────────────────────────────────────────────
function loadDeletedRides() {
  try { deletedRides = new Set(JSON.parse(localStorage.getItem('gravel-deleted-rides') || '[]')); }
  catch(e) { deletedRides = new Set(); }
  allRides = allRides.filter(r => !deletedRides.has(String(r.id)));
}

function deleteRide(id) {
  if (!confirm('Supprimer cette sortie de rides.json ?\n(Action locale — seulement après export + remplacement du fichier)')) return;
  deletedRides.add(String(id));
  localStorage.setItem('gravel-deleted-rides', JSON.stringify([...deletedRides]));
  const layer = layers[id];
  if (layer) { if (map.hasLayer(layer)) map.removeLayer(layer); delete layers[id]; }
  allRides = allRides.filter(r => String(r.id) !== String(id));
  renderList(); renderTimeline(); updateStats();
}

// ─── EXPORT ───────────────────────────────────────────────────────────────────
function exportRidesJson() {
  const blob = new Blob([JSON.stringify(allRides, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = 'rides.json'; a.click();
  URL.revokeObjectURL(url);
}

// ─── PROFIL ALTIMÉTRIQUE ──────────────────────────────────────────────────────
function getElevationPoints(layer) {
  try { return layer.get_elevation_data(); } catch(e) { return null; }
}

function elevationSVG(elevData) {
  if (!elevData || elevData.length < 3) return '';
  const W = 220, H = 48;
  const alts = elevData.map(p => p[1]), dists = elevData.map(p => p[0]);
  const minA = Math.min(...alts), maxA = Math.max(...alts);
  const minD = dists[0], maxD = dists[dists.length - 1];
  const aRange = maxA - minA || 1, dRange = maxD - minD || 1;
  const pts = elevData.map(([d, a]) =>
    `${((d-minD)/dRange*W).toFixed(1)},${(H-(a-minA)/aRange*(H-4)).toFixed(1)}`
  ).join(' ');
  return `
    <div class="popup-elev">
      <div class="popup-elev-label">Profil</div>
      <svg viewBox="0 0 ${W} ${H}" width="${W}" height="${H}" class="elev-svg">
        <defs>
          <linearGradient id="eg" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#FC4C02" stop-opacity="0.2"/>
            <stop offset="100%" stop-color="#FC4C02" stop-opacity="0"/>
          </linearGradient>
        </defs>
        <polygon points="0,${H} ${pts} ${W},${H}" fill="url(#eg)"/>
        <polyline points="${pts}" fill="none" stroke="#FC4C02" stroke-width="1.5" stroke-linejoin="round"/>
      </svg>
      <div class="elev-range"><span>${Math.round(minA)} m</span><span>${Math.round(maxA)} m</span></div>
    </div>`;
}

// ─── POPUP ────────────────────────────────────────────────────────────────────
function popupHTML(ride, elevData) {
  const date = new Date(ride.date).toLocaleDateString('fr-FR', { day:'numeric', month:'long', year:'numeric' });
  const saisonLabel = { ete:'Été', hiver:'Hiver', intersaison:'Intersaison' }[ride.saison] || ride.saison;
  const isPublic = ride.public !== false;
  return `
    <div class="popup-name">${ride.name}</div>
    <div class="popup-badges">
      <span class="badge badge-${ride.type}">${ride.type}</span>
      <span class="badge badge-${ride.statut}">${ride.statut === 'a_tester' ? 'À tester' : 'Déjà fait'}</span>
      ${!isPublic ? '<span class="badge badge-private">🔒 Privé</span>' : ''}
    </div>
    <div class="popup-stats">
      <div class="popup-stat"><div class="pval">${ride.distance_km}</div><div class="plbl">km</div></div>
      <div class="popup-stat"><div class="pval">${ride.elevation_m}</div><div class="plbl">D+ m</div></div>
      <div class="popup-stat"><div class="pval">${saisonLabel}</div><div class="plbl">Saison</div></div>
      <div class="popup-stat"><div class="pval">${ride.source}</div><div class="plbl">Source</div></div>
    </div>
    ${ride.description ? `<div class="popup-desc">${ride.description}</div>` : ''}
    <div class="popup-desc" style="border-top:none;padding-top:4px;margin-top:0">${date}</div>
    ${elevationSVG(elevData)}
    <div class="popup-actions">
      <button class="popup-btn" onclick="toggleStatut('${ride.id}')">
        ${ride.statut === 'fait' ? '⟳ À tester' : '✓ Marquer fait'}
      </button>
      <button class="popup-btn ${!isPublic ? 'is-private' : ''}" onclick="togglePublic('${ride.id}')">
        ${isPublic ? '🔒 Masquer' : '🌍 Publier'}
      </button>
    </div>
    <div style="margin-top:4px;text-align:right">
      <button class="popup-btn" style="flex:none;width:auto;padding:4px 10px;font-size:10px;color:var(--text3)" onclick="deleteRide('${ride.id}')">🗑️ Supprimer</button>
    </div>`;
}

// ─── FILTRES ──────────────────────────────────────────────────────────────────
function isVisible(ride) {
  if (!activeFilters.type.has(ride.type)) return false;
  if (!activeFilters.statut.has(ride.statut)) return false;
  if (!activeFilters.saison.has(ride.saison)) return false;
  if (activeFilters.year.size > 0 && !activeFilters.year.has(ride.date.slice(0, 4))) return false;
  if (![...activeFilters.distance].some(b => DISTANCE_BUCKETS[b]?.(ride))) return false;
  if (![...activeFilters.elevation].some(b => ELEVATION_BUCKETS[b]?.(ride))) return false;
  return true;
}

function applyFilters() {
  allRides.forEach(ride => {
    const visible = isVisible(ride);
    const layer = layers[ride.id];
    if (layer) {
      if (visible) { if (!map.hasLayer(layer)) map.addLayer(layer); }
      else         { if (map.hasLayer(layer))  map.removeLayer(layer); }
    }
  });
  renderList(); renderTimeline(); updateStats();
}

// Event delegation — fonctionne aussi pour les toggles d'année générés dynamiquement
document.querySelector('.filters').addEventListener('click', e => {
  const btn = e.target.closest('.toggle');
  if (!btn || !btn.dataset.filter) return;
  const { filter, value } = btn.dataset;
  if (activeFilters[filter].has(value)) {
    if (activeFilters[filter].size === 1) return; // garde au moins un actif
    activeFilters[filter].delete(value);
    btn.classList.remove('active');
  } else {
    activeFilters[filter].add(value);
    btn.classList.add('active');
  }
  applyFilters();
});

// ─── FILTRES ANNÉE (dynamiques) ───────────────────────────────────────────────
function renderYearToggles() {
  const years = [...new Set(allRides.map(r => r.date.slice(0, 4)))].sort();
  years.forEach(y => activeFilters.year.add(y));
  document.getElementById('year-toggles').innerHTML = years.map(y =>
    `<button class="toggle active t-year" data-filter="year" data-value="${y}">${y}</button>`
  ).join('');
}

// ─── LISTE & STATS ────────────────────────────────────────────────────────────
function renderList() {
  const list = document.getElementById('ride-list');
  const visible = allRides.filter(isVisible).sort((a, b) => new Date(b.date) - new Date(a.date));
  if (!visible.length) { list.innerHTML = '<div class="no-results">Aucune sortie avec ces filtres.</div>'; return; }
  list.innerHTML = visible.map(ride => {
    const date = new Date(ride.date).toLocaleDateString('fr-FR', { day:'2-digit', month:'2-digit', year:'numeric' });
    const isPrivate = ride.public === false;
    return `
      <div class="ride-card type-${ride.type} ${selectedId===ride.id?'selected':''} ${isPrivate?'is-private':''}" data-id="${ride.id}">
        <div class="ride-card-top">
          <div class="ride-name">${ride.name}</div>
          <div class="ride-badges">
            ${isPrivate ? '<span class="badge badge-private">🔒</span>' : ''}
            <span class="badge badge-${ride.statut}">${ride.statut==='a_tester'?'À tester':'Fait'}</span>
          </div>
        </div>
        <div class="ride-meta">
          <span>${ride.distance_km} km</span>
          <span>${ride.elevation_m} m D+</span>
        </div>
        <div class="ride-date">${date} · ${ride.source}</div>
      </div>`;
  }).join('');

  list.querySelectorAll('.ride-card').forEach(card =>
    card.addEventListener('click', () => focusRide(card.dataset.id))
  );
}

function focusRide(id) {
  selectedId = id;
  const layer = layers[id];
  if (layer && map.hasLayer(layer)) {
    map.fitBounds(layer.getBounds(), { padding: [40, 40] });
    layer.openPopup();
  }
  renderList();
}

function updateStats() {
  const visible = allRides.filter(isVisible);
  document.getElementById('s-total').textContent  = visible.length;
  document.getElementById('s-km').textContent     = Math.round(visible.reduce((s,r)=>s+r.distance_km,0)).toLocaleString('fr-FR');
  document.getElementById('s-dplus').textContent  = visible.reduce((s,r)=>s+r.elevation_m,0).toLocaleString('fr-FR');
  document.getElementById('s-gravel').textContent = visible.filter(r=>r.type==='gravel').length;
  document.getElementById('s-route').textContent  = visible.filter(r=>r.type==='route').length;
}

function renderTimeline() {
  const visible = allRides.filter(isVisible).sort((a,b) => new Date(a.date)-new Date(b.date));
  const dots = document.getElementById('timeline-dots');
  const yearsEl = document.getElementById('timeline-years');
  const rangeEl = document.getElementById('timeline-range');
  if (!visible.length) { dots.innerHTML=''; yearsEl.innerHTML=''; rangeEl.textContent='—'; return; }

  const dates = visible.map(r => new Date(r.date));
  const minD = Math.min(...dates), maxD = Math.max(...dates);
  const span = maxD - minD || 1;
  const minYear = new Date(minD).getFullYear(), maxYear = new Date(maxD).getFullYear();
  rangeEl.textContent = minYear === maxYear ? String(minYear) : `${minYear} → ${maxYear}`;

  dots.innerHTML = visible.map(ride => {
    const x = ((new Date(ride.date)-minD)/span*100).toFixed(1);
    return `<div class="t-dot" style="left:${x}%;background:${rideColors[ride.id]||'#888'}" title="${ride.name}" data-id="${ride.id}"></div>`;
  }).join('');
  dots.querySelectorAll('.t-dot').forEach(d => d.addEventListener('click', () => focusRide(d.dataset.id)));

  const years = []; for (let y=minYear; y<=maxYear; y++) years.push(y);
  yearsEl.innerHTML = years.map(y=>`<span>${y}</span>`).join('');
}

// ─── CHARGEMENT PROGRESSIF ────────────────────────────────────────────────────
async function loadRides() {
  // Local → rides.json (toutes tes sorties), déployé → rides_public.json (filtrées)
  const isLocal = ['localhost', '127.0.0.1'].includes(location.hostname);
  const file = isLocal ? 'data/rides.json' : 'data/rides_public.json';
  const res = await fetch(file);
  allRides = await res.json();

  await loadPrivacyZones();
  loadStatutOverrides();
  loadPublicOverrides();
  loadDeletedRides();
  allRides.forEach((ride, i) => { rideColors[ride.id] = getTrackColor(ride, i); });

  renderYearToggles();
  renderList(); renderTimeline(); updateStats();

  const ridesWithGpx = allRides.filter(r => r.gpx);
  let loadedCount = 0;
  const loadingEl = document.getElementById('loading-stat');
  const loadingCountEl = document.getElementById('s-loading');
  if (ridesWithGpx.length > 0) { loadingCountEl.textContent = `0/${ridesWithGpx.length}`; loadingEl.style.display = ''; }

  function onGpxDone() {
    loadedCount++;
    loadingCountEl.textContent = `${loadedCount}/${ridesWithGpx.length}`;
    if (loadedCount === ridesWithGpx.length) setTimeout(() => { loadingEl.style.display = 'none'; }, 1000);
  }

  for (const ride of allRides) {
    if (!ride.gpx) continue;
    const color = rideColors[ride.id];
    const layer = new L.GPX(ride.gpx, {
      async: true,
      marker_options: { startIconUrl: null, endIconUrl: null, shadowUrl: null },
      polyline_options: { color, weight: 3, opacity: 0.85 }
    });
    layer.on('loaded', function(e) {
      applyPrivacyZones(e.target);
      const elevData = getElevationPoints(e.target);
      layerElevData[ride.id] = elevData;
      e.target.bindPopup(popupHTML(ride, elevData), { maxWidth: 300 });
      onGpxDone();
    });
    layer.on('error', onGpxDone);
    layers[ride.id] = layer;
    if (isVisible(ride)) layer.addTo(map);
  }
}

loadRides();
</script>
</body>
</html>
