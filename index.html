<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mes Sorties Gravel</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Leaflet-GPX -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-gpx/2.1.2/gpx.min.js"></script>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0e0f0e;
      --bg2:       #161714;
      --bg3:       #1e1f1c;
      --border:    rgba(255,255,255,0.08);
      --border2:   rgba(255,255,255,0.14);
      --text:      #e8e6df;
      --text2:     #9a9891;
      --text3:     #5a5955;
      --accent:    #c8f04a;
      --accent2:   #8fb830;
      --gravel:    #e8914a;
      --route:     #5b9ef4;
      --fait:      #c8f04a;
      --a-tester:  #f4d45b;
      --hiver:     #7bc8f4;
      --ete:       #f4a35b;
      --intersaison: #b89ef4;
    }

    html, body { height: 100%; font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }

    /* ─── LAYOUT ─── */
    .app { display: grid; grid-template-rows: 52px 1fr; grid-template-columns: 300px 1fr; height: 100vh; }

    /* ─── HEADER ─── */
    header {
      grid-column: 1 / -1;
      display: flex; align-items: center; gap: 16px;
      padding: 0 20px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
    }
    .logo { font-family: 'Space Mono', monospace; font-size: 13px; font-weight: 700; letter-spacing: 0.05em; color: var(--accent); white-space: nowrap; }
    .stats-bar { display: flex; gap: 20px; margin-left: auto; }
    .stat { font-size: 11px; color: var(--text2); }
    .stat strong { color: var(--text); font-weight: 600; }
    #loading-stat { color: var(--text3); font-style: italic; }

    /* ─── SIDEBAR ─── */
    aside {
      background: var(--bg2);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      overflow: hidden;
    }

    .filters { padding: 14px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .filter-title { font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text3); margin-bottom: 10px; }

    .filter-group { margin-bottom: 12px; }
    .filter-label { font-size: 11px; color: var(--text2); margin-bottom: 6px; display: block; }

    .toggle-row { display: flex; gap: 6px; flex-wrap: wrap; }
    .toggle {
      font-size: 11px; font-weight: 500;
      padding: 4px 10px; border-radius: 20px;
      border: 1px solid var(--border2);
      background: transparent; color: var(--text2);
      cursor: pointer; transition: all 0.15s; white-space: nowrap;
    }
    .toggle:hover { border-color: var(--text2); color: var(--text); }
    .toggle.active { background: var(--bg3); border-color: var(--border2); }
    .toggle.active.t-gravel   { border-color: var(--gravel); color: var(--gravel); }
    .toggle.active.t-route    { border-color: var(--route); color: var(--route); }
    .toggle.active.t-fait     { border-color: var(--fait); color: var(--fait); }
    .toggle.active.t-a_tester { border-color: var(--a-tester); color: var(--a-tester); }
    .toggle.active.t-hiver    { border-color: var(--hiver); color: var(--hiver); }
    .toggle.active.t-ete      { border-color: var(--ete); color: var(--ete); }
    .toggle.active.t-intersaison { border-color: var(--intersaison); color: var(--intersaison); }

    /* Dot indicators on toggles */
    .toggle .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 5px; vertical-align: middle; }

    /* ─── RIDE LIST ─── */
    .ride-list { flex: 1; overflow-y: auto; padding: 8px; }
    .ride-list::-webkit-scrollbar { width: 4px; }
    .ride-list::-webkit-scrollbar-track { background: transparent; }
    .ride-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

    .ride-card {
      padding: 10px 12px; border-radius: 8px; margin-bottom: 4px;
      border: 1px solid var(--border);
      cursor: pointer; transition: all 0.15s;
      position: relative; overflow: hidden;
    }
    .ride-card::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
    }
    .ride-card.type-gravel::before { background: var(--gravel); }
    .ride-card.type-route::before  { background: var(--route); }
    .ride-card:hover { background: var(--bg3); border-color: var(--border2); }
    .ride-card.selected { background: var(--bg3); border-color: var(--border2); }

    .ride-card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 6px; }
    .ride-name { font-size: 13px; font-weight: 500; color: var(--text); line-height: 1.3; }
    .ride-badges { display: flex; gap: 4px; flex-shrink: 0; }
    .badge {
      font-size: 9px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase;
      padding: 2px 6px; border-radius: 10px;
    }
    .badge-fait     { background: rgba(200,240,74,0.12); color: var(--fait); }
    .badge-a_tester { background: rgba(244,212,91,0.12); color: var(--a-tester); }
    .badge-gravel   { background: rgba(232,145,74,0.12); color: var(--gravel); }
    .badge-route    { background: rgba(91,158,244,0.12); color: var(--route); }

    .ride-meta { display: flex; gap: 12px; margin-top: 5px; }
    .ride-meta span { font-size: 11px; color: var(--text2); }
    .ride-date { font-size: 10px; color: var(--text3); margin-top: 3px; font-family: 'Space Mono', monospace; }

    .no-results { padding: 24px 16px; text-align: center; font-size: 13px; color: var(--text3); }

    /* ─── SIDEBAR FOOTER ─── */
    .sidebar-footer { padding: 10px 16px; border-top: 1px solid var(--border); flex-shrink: 0; }
    .export-btn {
      width: 100%; padding: 7px; font-size: 11px; font-weight: 500;
      letter-spacing: 0.03em; border-radius: 6px;
      border: 1px solid var(--border2); background: transparent;
      color: var(--text3); cursor: pointer; transition: all 0.15s;
    }
    .export-btn:hover { border-color: var(--border2); color: var(--text2); background: var(--bg3); }

    /* ─── MAP ─── */
    #map { width: 100%; height: 100%; background: #0a0b09; }

    /* ─── POPUP ─── */
    .leaflet-popup-content-wrapper {
      background: var(--bg2) !important;
      border: 1px solid var(--border2) !important;
      border-radius: 10px !important;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5) !important;
      color: var(--text) !important;
    }
    .leaflet-popup-tip { background: var(--bg2) !important; }
    .leaflet-popup-content { margin: 14px 16px !important; min-width: 220px; }

    .popup-name { font-weight: 600; font-size: 14px; margin-bottom: 8px; }
    .popup-badges { display: flex; gap: 5px; margin-bottom: 10px; }
    .popup-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .popup-stat { background: var(--bg3); border-radius: 6px; padding: 6px 8px; }
    .popup-stat .pval { font-size: 16px; font-weight: 600; font-family: 'Space Mono', monospace; }
    .popup-stat .plbl { font-size: 10px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.05em; }
    .popup-desc { font-size: 12px; color: var(--text2); margin-top: 8px; line-height: 1.5; border-top: 1px solid var(--border); padding-top: 8px; }

    /* Profil altimétrique */
    .popup-elev { margin-top: 10px; border-top: 1px solid var(--border); padding-top: 10px; }
    .popup-elev-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px; }
    .elev-svg { display: block; width: 100%; height: auto; }
    .elev-range { display: flex; justify-content: space-between; font-size: 10px; color: var(--text3); font-family: 'Space Mono', monospace; margin-top: 2px; }

    /* Bouton toggle statut */
    .popup-toggle-btn {
      width: 100%; margin-top: 10px; padding: 7px; font-size: 12px; font-weight: 500;
      border-radius: 6px; border: 1px solid var(--border2);
      background: var(--bg3); color: var(--text2);
      cursor: pointer; transition: all 0.15s;
    }
    .popup-toggle-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ─── MAP CONTROLS ─── */
    .leaflet-control-zoom { border: 1px solid var(--border2) !important; border-radius: 8px !important; overflow: hidden; }
    .leaflet-control-zoom a { background: var(--bg2) !important; color: var(--text) !important; border-color: var(--border) !important; }
    .leaflet-control-zoom a:hover { background: var(--bg3) !important; }

    /* ─── TIMELINE ─── */
    .timeline {
      position: fixed; bottom: 16px; left: 316px; right: 16px;
      background: var(--bg2); border: 1px solid var(--border2);
      border-radius: 12px; padding: 10px 16px 8px;
      z-index: 1000;
    }
    .timeline-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .timeline-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600; }
    .timeline-range { font-size: 11px; color: var(--text2); font-family: 'Space Mono', monospace; }

    .timeline-track { position: relative; height: 32px; }
    .timeline-axis { position: absolute; bottom: 0; left: 0; right: 0; height: 1px; background: var(--border2); }
    .timeline-dots { position: absolute; bottom: 6px; left: 0; right: 0; height: 20px; }
    .t-dot {
      position: absolute; width: 8px; height: 8px; border-radius: 50%;
      transform: translateX(-50%);
      cursor: pointer; transition: transform 0.15s;
      border: 1px solid rgba(0,0,0,0.3);
    }
    .t-dot:hover { transform: translateX(-50%) scale(1.4); }
    .t-dot.dimmed { opacity: 0.25; }
    .timeline-year-labels { display: flex; justify-content: space-between; margin-top: 4px; }
    .timeline-year-labels span { font-size: 10px; color: var(--text3); font-family: 'Space Mono', monospace; }
  </style>
</head>
<body>

<div class="app">
  <header>
    <div class="logo">// MES SORTIES</div>
    <div class="stats-bar" id="stats-bar">
      <div class="stat"><strong id="s-total">0</strong> sorties</div>
      <div class="stat"><strong id="s-km">0</strong> km total</div>
      <div class="stat"><strong id="s-dplus">0</strong> m D+</div>
      <div class="stat"><strong id="s-gravel">0</strong> gravel</div>
      <div class="stat"><strong id="s-route">0</strong> route</div>
      <div class="stat" id="loading-stat" style="display:none">⟳ <strong id="s-loading">0</strong> GPX</div>
    </div>
  </header>

  <aside>
    <div class="filters">
      <div class="filter-title">Filtres</div>

      <div class="filter-group">
        <span class="filter-label">Type</span>
        <div class="toggle-row">
          <button class="toggle active t-gravel" data-filter="type" data-value="gravel">
            <span class="dot" style="background:var(--gravel)"></span>Gravel
          </button>
          <button class="toggle active t-route" data-filter="type" data-value="route">
            <span class="dot" style="background:var(--route)"></span>Route
          </button>
        </div>
      </div>

      <div class="filter-group">
        <span class="filter-label">Statut</span>
        <div class="toggle-row">
          <button class="toggle active t-fait" data-filter="statut" data-value="fait">
            <span class="dot" style="background:var(--fait)"></span>Déjà fait
          </button>
          <button class="toggle active t-a_tester" data-filter="statut" data-value="a_tester">
            <span class="dot" style="background:var(--a-tester)"></span>À tester
          </button>
        </div>
      </div>

      <div class="filter-group">
        <span class="filter-label">Saison</span>
        <div class="toggle-row">
          <button class="toggle active t-ete" data-filter="saison" data-value="ete">
            <span class="dot" style="background:var(--ete)"></span>Été
          </button>
          <button class="toggle active t-hiver" data-filter="saison" data-value="hiver">
            <span class="dot" style="background:var(--hiver)"></span>Hiver
          </button>
          <button class="toggle active t-intersaison" data-filter="saison" data-value="intersaison">
            <span class="dot" style="background:var(--intersaison)"></span>Intersaison
          </button>
        </div>
      </div>
    </div>

    <div class="ride-list" id="ride-list"></div>

    <div class="sidebar-footer">
      <button class="export-btn" onclick="exportRidesJson()">↓ Exporter rides.json</button>
    </div>
  </aside>

  <div id="map"></div>
</div>

<!-- Timeline -->
<div class="timeline" id="timeline">
  <div class="timeline-header">
    <span class="timeline-label">Timeline</span>
    <span class="timeline-range" id="timeline-range">—</span>
  </div>
  <div class="timeline-track">
    <div class="timeline-dots" id="timeline-dots"></div>
    <div class="timeline-axis"></div>
  </div>
  <div class="timeline-year-labels" id="timeline-years"></div>
</div>

<script>
const COLORS = {
  type:    { gravel: '#e8914a', route: '#5b9ef4' },
  statut:  { fait: '#c8f04a', a_tester: '#f4d45b' },
  saison:  { ete: '#f4a35b', hiver: '#7bc8f4', intersaison: '#b89ef4' }
};

let allRides = [];
let layers = {};         // id -> L.GPX layer
let rideColors = {};     // id -> couleur de trace
let layerElevData = {};  // id -> données d'altitude [[dist, alt], ...]
let statutOverrides = {};// id -> statut modifié localement (localStorage)
let activeFilters = { type: new Set(['gravel','route']), statut: new Set(['fait','a_tester']), saison: new Set(['ete','hiver','intersaison']) };
let selectedId = null;

const map = L.map('map', {
  center: [48.65, 2.3],
  zoom: 9,
  zoomControl: true,
  attributionControl: false
});

delete L.Icon.Default.prototype._getIconUrl;
L.Icon.Default.mergeOptions({
  iconRetinaUrl: 'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7',
  iconUrl: 'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7',
  shadowUrl: ''
});

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  maxZoom: 18
}).addTo(map);

L.control.attribution({ prefix: false, position: 'bottomright' }).addTo(map);

const PALETTE = [
  '#e8914a','#5b9ef4','#c8f04a','#f4d45b','#f472b6',
  '#34d399','#a78bfa','#fb7185','#38bdf8','#facc15',
  '#4ade80','#f97316','#818cf8','#2dd4bf','#e879f9'
];

function getTrackColor(ride, index) {
  return PALETTE[index % PALETTE.length];
}

// ─── STATUT OVERRIDES (localStorage) ─────────────────────────────────────────
function loadStatutOverrides() {
  try {
    statutOverrides = JSON.parse(localStorage.getItem('gravel-statut-overrides') || '{}');
  } catch(e) { statutOverrides = {}; }
  allRides.forEach(ride => {
    if (statutOverrides[ride.id]) ride.statut = statutOverrides[ride.id];
  });
}

function toggleStatut(id) {
  const ride = allRides.find(r => r.id === id);
  if (!ride) return;
  ride.statut = ride.statut === 'fait' ? 'a_tester' : 'fait';
  statutOverrides[ride.id] = ride.statut;
  localStorage.setItem('gravel-statut-overrides', JSON.stringify(statutOverrides));

  // Rebind popup avec le nouveau contenu
  const layer = layers[id];
  if (layer) {
    layer.bindPopup(popupHTML(ride, layerElevData[id]), { maxWidth: 300 });
  }

  selectedId = id;
  applyFilters();

  // Ré-ouvrir le popup si la sortie est encore visible
  if (layer && map.hasLayer(layer)) {
    setTimeout(() => layer.openPopup(), 50);
  }
}

// ─── EXPORT ───────────────────────────────────────────────────────────────────
function exportRidesJson() {
  const data = JSON.stringify(allRides, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'rides.json';
  a.click();
  URL.revokeObjectURL(url);
}

// ─── PROFIL ALTIMÉTRIQUE ──────────────────────────────────────────────────────
function getElevationPoints(layer) {
  try {
    return layer.get_elevation_data();
  } catch(e) { return null; }
}

function elevationSVG(elevData) {
  if (!elevData || elevData.length < 3) return '';
  const W = 220, H = 48;
  const alts  = elevData.map(p => p[1]);
  const dists = elevData.map(p => p[0]);
  const minA = Math.min(...alts),  maxA = Math.max(...alts);
  const minD = dists[0],           maxD = dists[dists.length - 1];
  const aRange = maxA - minA || 1;
  const dRange = maxD - minD || 1;

  const pts = elevData.map(([d, a]) => {
    const x = ((d - minD) / dRange * W).toFixed(1);
    const y = (H - (a - minA) / aRange * (H - 4)).toFixed(1);
    return `${x},${y}`;
  }).join(' ');

  return `
    <div class="popup-elev">
      <div class="popup-elev-label">Profil</div>
      <svg viewBox="0 0 ${W} ${H}" width="${W}" height="${H}" class="elev-svg">
        <defs>
          <linearGradient id="eg" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#c8f04a" stop-opacity="0.25"/>
            <stop offset="100%" stop-color="#c8f04a" stop-opacity="0"/>
          </linearGradient>
        </defs>
        <polygon points="0,${H} ${pts} ${W},${H}" fill="url(#eg)"/>
        <polyline points="${pts}" fill="none" stroke="#c8f04a" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>
      </svg>
      <div class="elev-range">
        <span>${Math.round(minA)} m</span><span>${Math.round(maxA)} m</span>
      </div>
    </div>`;
}

// ─── POPUP ────────────────────────────────────────────────────────────────────
function popupHTML(ride, elevData) {
  const date = new Date(ride.date).toLocaleDateString('fr-FR', { day:'numeric', month:'long', year:'numeric' });
  const saisonLabel = { ete:'Été', hiver:'Hiver', intersaison:'Intersaison' }[ride.saison] || ride.saison;
  const btnLabel = ride.statut === 'fait' ? '⟳ Remettre à tester' : '✓ Marquer comme fait';
  return `
    <div class="popup-name">${ride.name}</div>
    <div class="popup-badges">
      <span class="badge badge-${ride.type}">${ride.type}</span>
      <span class="badge badge-${ride.statut}">${ride.statut === 'a_tester' ? 'À tester' : 'Déjà fait'}</span>
    </div>
    <div class="popup-stats">
      <div class="popup-stat"><div class="pval">${ride.distance_km}</div><div class="plbl">km</div></div>
      <div class="popup-stat"><div class="pval">${ride.elevation_m}</div><div class="plbl">D+ m</div></div>
      <div class="popup-stat"><div class="pval">${saisonLabel}</div><div class="plbl">Saison</div></div>
      <div class="popup-stat"><div class="pval">${ride.source}</div><div class="plbl">Source</div></div>
    </div>
    ${ride.description ? `<div class="popup-desc">${ride.description}</div>` : ''}
    <div class="popup-desc" style="border-top:none;padding-top:4px;margin-top:0">${date}</div>
    ${elevationSVG(elevData)}
    <button class="popup-toggle-btn" onclick="toggleStatut('${ride.id}')">${btnLabel}</button>
  `;
}

// ─── FILTRES & UI ─────────────────────────────────────────────────────────────
function isVisible(ride) {
  return activeFilters.type.has(ride.type) &&
         activeFilters.statut.has(ride.statut) &&
         activeFilters.saison.has(ride.saison);
}

function applyFilters() {
  allRides.forEach(ride => {
    const visible = isVisible(ride);
    const layer = layers[ride.id];
    if (layer) {
      if (visible) { if (!map.hasLayer(layer)) map.addLayer(layer); }
      else         { if (map.hasLayer(layer))  map.removeLayer(layer); }
    }
  });
  renderList();
  renderTimeline();
  updateStats();
}

function renderList() {
  const list = document.getElementById('ride-list');
  const visible = allRides.filter(isVisible).sort((a,b) => new Date(b.date)-new Date(a.date));
  if (!visible.length) { list.innerHTML = '<div class="no-results">Aucune sortie avec ces filtres.</div>'; return; }
  list.innerHTML = visible.map(ride => {
    const date = new Date(ride.date).toLocaleDateString('fr-FR', { day:'2-digit', month:'2-digit', year:'numeric' });
    return `
    <div class="ride-card type-${ride.type} ${selectedId===ride.id?'selected':''}" data-id="${ride.id}">
      <div class="ride-card-top">
        <div class="ride-name">${ride.name}</div>
        <div class="ride-badges">
          <span class="badge badge-${ride.statut}">${ride.statut==='a_tester'?'À tester':'Fait'}</span>
        </div>
      </div>
      <div class="ride-meta">
        <span>${ride.distance_km} km</span>
        <span>${ride.elevation_m} m D+</span>
      </div>
      <div class="ride-date">${date} · ${ride.source}</div>
    </div>`;
  }).join('');

  list.querySelectorAll('.ride-card').forEach(card => {
    card.addEventListener('click', () => focusRide(card.dataset.id));
  });
}

function focusRide(id) {
  selectedId = id;
  const layer = layers[id];
  if (layer && map.hasLayer(layer)) {
    map.fitBounds(layer.getBounds(), { padding: [40, 40] });
    layer.openPopup();
  }
  renderList();
}

function updateStats() {
  const visible = allRides.filter(isVisible);
  document.getElementById('s-total').textContent  = visible.length;
  document.getElementById('s-km').textContent     = visible.reduce((s,r)=>s+r.distance_km,0).toLocaleString('fr-FR');
  document.getElementById('s-dplus').textContent  = visible.reduce((s,r)=>s+r.elevation_m,0).toLocaleString('fr-FR');
  document.getElementById('s-gravel').textContent = visible.filter(r=>r.type==='gravel').length;
  document.getElementById('s-route').textContent  = visible.filter(r=>r.type==='route').length;
}

function renderTimeline() {
  const visible = allRides.filter(isVisible).sort((a,b) => new Date(a.date)-new Date(b.date));
  const dots = document.getElementById('timeline-dots');
  const yearsEl = document.getElementById('timeline-years');
  const rangeEl = document.getElementById('timeline-range');
  if (!visible.length) { dots.innerHTML=''; yearsEl.innerHTML=''; rangeEl.textContent='—'; return; }

  const dates = visible.map(r=>new Date(r.date));
  const minD = Math.min(...dates), maxD = Math.max(...dates);
  const span = maxD - minD || 1;

  const minYear = new Date(minD).getFullYear();
  const maxYear = new Date(maxD).getFullYear();
  rangeEl.textContent = minYear === maxYear ? String(minYear) : `${minYear} → ${maxYear}`;

  dots.innerHTML = visible.map(ride => {
    const x = ((new Date(ride.date)-minD)/span*100).toFixed(1);
    const col = rideColors[ride.id] || '#888';
    return `<div class="t-dot" style="left:${x}%;background:${col}" title="${ride.name}" data-id="${ride.id}"></div>`;
  }).join('');

  dots.querySelectorAll('.t-dot').forEach(d => {
    d.addEventListener('click', () => focusRide(d.dataset.id));
  });

  const years = [];
  for (let y = minYear; y <= maxYear; y++) years.push(y);
  yearsEl.innerHTML = years.map(y => `<span>${y}</span>`).join('');
}

// ─── CHARGEMENT PROGRESSIF ────────────────────────────────────────────────────
async function loadRides() {
  const res = await fetch('data/rides.json');
  allRides = await res.json();

  // Applique les overrides de statut depuis localStorage
  loadStatutOverrides();

  // Assigne les couleurs et affiche l'UI immédiatement
  allRides.forEach((ride, i) => { rideColors[ride.id] = getTrackColor(ride, i); });
  renderList();
  renderTimeline();
  updateStats();

  // Compteur de progression GPX
  const ridesWithGpx = allRides.filter(r => r.gpx);
  let loadedCount = 0;
  const loadingEl = document.getElementById('loading-stat');
  const loadingCountEl = document.getElementById('s-loading');
  if (ridesWithGpx.length > 0) {
    loadingCountEl.textContent = `0/${ridesWithGpx.length}`;
    loadingEl.style.display = '';
  }

  function onGpxDone() {
    loadedCount++;
    loadingCountEl.textContent = `${loadedCount}/${ridesWithGpx.length}`;
    if (loadedCount === ridesWithGpx.length) {
      setTimeout(() => { loadingEl.style.display = 'none'; }, 1000);
    }
  }

  // Lance tous les chargements GPX en parallèle
  for (const ride of allRides) {
    if (!ride.gpx) continue;
    const color = rideColors[ride.id];
    const layer = new L.GPX(ride.gpx, {
      async: true,
      marker_options: { startIconUrl: null, endIconUrl: null, shadowUrl: null },
      polyline_options: { color, weight: 3, opacity: 0.85 }
    });
    layer.on('loaded', function(e) {
      const elevData = getElevationPoints(e.target);
      layerElevData[ride.id] = elevData;
      e.target.bindPopup(popupHTML(ride, elevData), { maxWidth: 300 });
      onGpxDone();
    });
    layer.on('error', onGpxDone);
    layers[ride.id] = layer;
    if (isVisible(ride)) layer.addTo(map);
  }
}

// ─── FILTRES ──────────────────────────────────────────────────────────────────
document.querySelectorAll('.toggle').forEach(btn => {
  btn.addEventListener('click', () => {
    const { filter, value } = btn.dataset;
    if (activeFilters[filter].has(value)) {
      if (activeFilters[filter].size === 1) return; // garde au moins un actif
      activeFilters[filter].delete(value);
      btn.classList.remove('active');
    } else {
      activeFilters[filter].add(value);
      btn.classList.add('active');
    }
    applyFilters();
  });
});

loadRides();
</script>
